name: tangdun
description: 糖盾 - 基于多源数据融合的糖尿病智能健康管理系统
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.4.0
  fl_chart: ^0.66.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  image_picker: ^1.0.0
  provider: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

  fonts:
    - family: PingFang SC
      fonts:
        - asset: assets/fonts/PingFang.ttc
